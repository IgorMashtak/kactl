name: Build KACTL PDF

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install LaTeX
        run: sudo apt update && sudo apt install -y texlive texlive-latex-extra texlive-fonts-extra make
      - name: Build PDF
        run: make kactl
      - name: Upload PDF
        uses: actions/upload-artifact@v3
        with:
          name: kactl.pdf
          path: kactl.pdf
